<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MoonTV Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="login-page">
      <div class="login-card">
        <h1>MoonTV</h1>
        <p class="login-sub">管理面板</p>
        <form id="login-form">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="login-username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="login-password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary btn-block">登录</button>
        </form>
      </div>
    </div>

    <div id="main-layout" class="hidden">
      <aside id="sidebar">
        <div class="sidebar-header">
          <h2>MoonTV</h2>
        </div>
        <nav id="nav">
          <a href="#/" data-page="dashboard" class="nav-item active">
            <span class="nav-icon">&#9632;</span>仪表盘
          </a>
          <a href="#/users" data-page="users" class="nav-item admin-only">
            <span class="nav-icon">&#9679;</span>用户管理
          </a>
          <a href="#/invites" data-page="invites" class="nav-item admin-only">
            <span class="nav-icon">&#9830;</span>邀请码
          </a>
          <a href="#/sources" data-page="sources" class="nav-item admin-only">
            <span class="nav-icon">&#9733;</span>全局源
          </a>
          <a href="#/account" data-page="account" class="nav-item">
            <span class="nav-icon">&#9883;</span>我的账号
          </a>
          <a href="#/docs" data-page="docs" class="nav-item">
            <span class="nav-icon">&#9998;</span>API 文档
          </a>
        </nav>
        <div class="sidebar-footer">
          <div class="user-info">
            <span id="sidebar-username"></span>
            <span id="sidebar-role" class="badge"></span>
          </div>
          <button id="logout-btn" class="btn btn-sm btn-outline">退出登录</button>
        </div>
      </aside>
      <main id="content"></main>
    </div>
  </div>

  <div id="toast-container"></div>
  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <div id="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close" class="btn-icon">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
